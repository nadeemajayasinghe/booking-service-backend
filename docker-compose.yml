version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: booking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vehicle_rental_booking
      MYSQL_USER: bookinguser
      MYSQL_PASSWORD: bookingpassword
    ports:
      - "3308:3306"   # ← change to 3308 (3307 is used by vehicle service)
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - booking-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"   # ← change to 8082 (8081 is used by vehicle service)
    environment:
      DB_URL: jdbc:mysql://db:3306/vehicle_rental_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: bookinguser
      DB_PASSWORD: bookingpassword
      JPA_DDL_AUTO: update
      SHOW_SQL: "false"
      LOG_LEVEL: DEBUG
      EUREKA_ENABLED: "false"
      # ← Add Kafka config
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - booking-net
      - vehicle-net   # ← join vehicle network to reach kafka

volumes:
  mysql-data:
    driver: local

networks:
  booking-net:
    driver: bridge
  vehicle-net:
    external: true    # ← reference the existing vehicle network
    name: micro-service-ctse-assignment_vehicle-net