# Application Configuration
spring.application.name=booking-service
server.port=${PORT:8082}

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vehicle_rental_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.data.jdbc.dialect=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.vehiclerental.bookingservice=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO

# Eureka Service Discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${BOOKING_ALB_HOST}
eureka.instance.non-secure-port=80
eureka.instance.non-secure-port-enabled=true
eureka.instance.secure-port-enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Kafka ──────────────────────────────────────────────────────────────────────
# In production, override via environment variables:
#   SPRING_KAFKA_BOOTSTRAP_SERVERS=vehicle-kafka-namespace.servicebus.windows.net:9093
#   KAFKA_CONNECTION_STRING=Endpoint=sb://vehicle-kafka-namespace...
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=booking-service-group

# ── Kafka Topics ───────────────────────────────────────────────────────────────
app.kafka.topic.vehicle-created=vehicle-created
app.kafka.topic.vehicle-updated=vehicle-updated
app.kafka.topic.vehicle-deleted=vehicle-deleted