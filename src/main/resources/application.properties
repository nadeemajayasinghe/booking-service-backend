# Application Configuration
spring.application.name=booking-service
server.port=${PORT:8081}

# MySQL Database Configuration
# In production these values come from environment variables / Azure secrets
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vehicle_rental_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:111600}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.data.jdbc.dialect=mysql

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.vehiclerental.bookingservice=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=INFO

# Eureka Service Discovery
# In container environments, set EUREKA_URL env var; falls back to localhost
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.enabled=${EUREKA_ENABLED:true}

# Actuator endpoints (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always